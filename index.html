<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inovance Product Selection Tool</title>
    <!-- Use Google Fonts (Inter) for modern typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="app-header">
        <div class="header-left">
            <img src="INOVANCE_Logo.png" alt="INOVANCE" class="logo-img">
            <span class="header-subtitle" style="margin-left: 20px; font-size: 14px; font-weight: 500; color: #666;">로봇
                제품 선정</span>
        </div>
        <div class="header-right">
            <!-- Removed language and login per request -->
        </div>
    </header>

    <div class="main-container">
        <!-- Filter Section -->
        <section class="filter-section">
            <div class="filter-header">
                <div class="filter-title-wrap">
                    <h2>제품 파라미터 필터</h2>
                    <span class="info-icon">?</span>
                </div>
                <button id="reset-btn" class="reset-btn">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
                        <path d="M3 3v5h5" />
                    </svg>
                    초기화
                </button>
            </div>

            <div class="filter-grid" id="filter-container">
                <!-- Filters will be generated dynamically -->
            </div>

            <div class="filter-footer">
                <button class="more-filters-btn">필터 더보기
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="m6 9 6 6 6-6" />
                    </svg>
                </button>
            </div>
        </section>

        <!-- Product List Section -->
        <section class="products-section">
            <div class="product-grid" id="product-container">
                <!-- Products will be generated dynamically -->
            </div>
        </section>
    </div>

    <!-- Modal for Options -->
    <div id="options-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content" style="width: 1100px; max-width: 95%; max-height: 90vh;">
            <div class="modal-header" data-html2canvas-ignore="true">
                <h3 id="modal-title">제품 상세 및 구성</h3>
                <button id="close-modal-btn" class="close-btn">&times;</button>
            </div>
            <div class="modal-body" id="modal-body" style="display:flex; gap: 40px; overflow-y: auto;">
                <!-- Content will be populated here -->
            </div>
            <div class="modal-footer" data-html2canvas-ignore="true">
                <button id="download-pdf-btn" class="primary-btn" style="background-color: #f7941d;">구성 내역 PDF
                    다운로드</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="data.js"></script>
    <script src="script.js"></script>
</body>

</html>
